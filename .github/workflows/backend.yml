name: Backend Testing
on:
    push:
        branches: [main]
        paths:
            - hyperglass/**
            - .github/**
    pull_request:

# One run per branch; pushing again (e.g. a Renovate rebase) cancels the
# superseded run instead of letting it occupy the queue.
concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    backend:
        name: Backend Tests
        strategy:
            fail-fast: false
            matrix:
                node-version: [20.x]
                pnpm-version: [9]
                redis-version: [latest]
                python-version: ["3.11", "3.12"]
                os: [ubuntu-latest]
        runs-on: ${{ matrix.os }}

        steps:
            - name: Git Checkout
              uses: actions/checkout@v3

            - name: Install system packages
              run: |
                    sudo apt-get update
                    sudo apt-get install -y python3-dev

            - name: Install Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Setup uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install PNPM
              uses: pnpm/action-setup@v3
              with:
                  version: ${{ matrix.pnpm-version }}

            - name: Start Redis
              uses: supercharge/redis-github-action@1.8.1
              with:
                  redis-version: ${{ matrix.redis-version }}

            - name: Prepare
              run: |
                  mkdir -p "$HOME/hyperglass"
                  echo "HYPERGLASS_APP_PATH=$HOME/hyperglass" >> $GITHUB_ENV
                  echo "HYPERGLASS_HOST=127.0.0.1" >> $GITHUB_ENV
                  echo "HYPERGLASS_PORT=8001" >> $GITHUB_ENV

            - name: Install
              run: uv sync --python ${{ matrix.python-version }}

            - name: Activate virtualenv
              run: |
                  . .venv/bin/activate
                  echo PATH=$PATH >> $GITHUB_ENV

            - name: Lint (Ruff)
              run: ruff check .

            - name: Tests (PyTest)
              run: pytest hyperglass --ignore hyperglass/plugins/external

            - name: Run hyperglass
              run: ".tests/ga-backend-app.sh"
