name: Frontend Testing
on:
    push:
        branches: [main]
        paths:
            - hyperglass/ui/**
            - .github/**
    pull_request:

# One run per branch; pushing again (e.g. a Renovate rebase) cancels the
# superseded run instead of letting it occupy the queue.
concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

jobs:
    frontend:
        name: Frontend Tests
        strategy:
            fail-fast: false
            matrix:
                node-version: [20.x, 22.x, 24.x]
                pnpm-version: [9, 10]
                os: [ubuntu-latest]
        runs-on: ${{ matrix.os }}
        env:
            working-directory: ./hyperglass/ui
        steps:
            - name: Git Checkout
              uses: actions/checkout@v3

            - name: Install Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install PNPM
              uses: pnpm/action-setup@v6
              with:
                  version: ${{ matrix.pnpm-version }}

            - name: Install Dependencies
              working-directory: ${{ env.working-directory }}
              run: pnpm install

            # next build prerenders pages that import hyperglass.json at build
            # time, so an empty stub isn't enough — use a realistic fixture
            # generated from the .tests config (see .tests/hyperglass.json).
            - name: Create hyperglass.json from fixture
              working-directory: ${{ env.working-directory }}
              run: cp ../../.tests/hyperglass.json hyperglass.json

            - name: Formatting
              working-directory: ${{ env.working-directory }}
              run: pnpm run format:check

            - name: Lint
              working-directory: ${{ env.working-directory }}
              run: pnpm run lint

            - name: Check Types
              working-directory: ${{ env.working-directory }}
              run: pnpm run typecheck

            - name: Tests
              working-directory: ${{ env.working-directory }}
              run: pnpm run test:coverage

            # Catch production-build breakage (webpack/prerender) that
            # format/lint/typecheck/vitest don't exercise.
            - name: Production Build
              working-directory: ${{ env.working-directory }}
              run: pnpm exec next build
